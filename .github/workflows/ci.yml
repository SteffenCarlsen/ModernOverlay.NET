name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_windows_integration_tests:
        description: Run tests marked WindowsIntegration
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-test:
    name: Windows .NET 11 Preview
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Prepare artifacts
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path artifacts

      - name: Restore
        shell: pwsh
        run: dotnet restore ModernOverlay.sln -bl:artifacts\restore.binlog

      - name: Validate solution shape
        shell: pwsh
        run: |
          $solutionText = Get-Content -Path ModernOverlay.sln -Raw
          if ($solutionText -match '2150E333-8FDC-42A3-9474-1A3956D46DE8' -or $solutionText -match 'GlobalSection\(NestedProjects\)') {
            throw 'ModernOverlay.sln contains virtual solution folders or nested-project entries. Use --in-root when adding projects.'
          }

      - name: Build
        shell: pwsh
        run: dotnet build ModernOverlay.sln --configuration Release --no-restore -m:1 -bl:artifacts\build.binlog

      - name: Test non-integration
        shell: pwsh
        run: dotnet test ModernOverlay.sln --configuration Release --no-build --filter "TestCategory!=WindowsIntegration" --logger trx --results-directory artifacts\TestResults -bl:artifacts\test-unit.binlog

      - name: Test Windows integration
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_windows_integration_tests == 'true' }}
        shell: pwsh
        run: dotnet test ModernOverlay.sln --configuration Release --no-build --filter "TestCategory=WindowsIntegration" --logger trx --results-directory artifacts\TestResults -bl:artifacts\test-windows-integration.binlog

      - name: Pack
        shell: pwsh
        run: dotnet pack ModernOverlay.sln --configuration Release --no-build -m:1 -bl:artifacts\pack.binlog

      - name: Benchmark dry run
        shell: pwsh
        run: |
          Push-Location benchmarks\ModernOverlay.Benchmarks
          try {
            dotnet run --project .\ModernOverlay.Benchmarks.csproj --configuration Release --no-build -- --filter "*" --job Dry --noOverwrite *> benchmark-dryrun-latest.log
            if ($LASTEXITCODE -ne 0) {
              throw "Benchmark dry run failed with exit code $LASTEXITCODE."
            }

            $issuePatterns = 'Benchmarks with issues', '// Build Error', '// Exception', 'No benchmarks were found', 'No loggers defined'
            foreach ($pattern in $issuePatterns) {
              if (Select-String -Path benchmark-dryrun-latest.log -Pattern $pattern -Quiet) {
                throw "Benchmark dry run log contains '$pattern'."
              }
            }
          }
          finally {
            Pop-Location
          }

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-diagnostics
          path: |
            artifacts/**/*.binlog
            artifacts/TestResults/**/*.trx
            benchmarks/ModernOverlay.Benchmarks/benchmark-dryrun-latest.log
            benchmarks/ModernOverlay.Benchmarks/BenchmarkDotNet.Artifacts/**/*
            docs/dependency-report.md
