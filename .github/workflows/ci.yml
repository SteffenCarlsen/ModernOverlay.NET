name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_windows_integration_tests:
        description: Run tests marked WindowsIntegration
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-test:
    name: Windows .NET 11 Preview
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Prepare artifacts
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path artifacts

      - name: Restore
        shell: pwsh
        run: dotnet restore ModernOverlay.sln -bl:artifacts\restore.binlog

      - name: Build
        shell: pwsh
        run: dotnet build ModernOverlay.sln --configuration Release --no-restore -m:1 -bl:artifacts\build.binlog

      - name: Test non-integration
        shell: pwsh
        run: dotnet test ModernOverlay.sln --configuration Release --no-build --filter "TestCategory!=WindowsIntegration" --logger trx --results-directory artifacts\TestResults -bl:artifacts\test-unit.binlog

      - name: Test Windows integration
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_windows_integration_tests == 'true' }}
        shell: pwsh
        run: dotnet test ModernOverlay.sln --configuration Release --no-build --filter "TestCategory=WindowsIntegration" --logger trx --results-directory artifacts\TestResults -bl:artifacts\test-windows-integration.binlog

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-diagnostics
          path: |
            artifacts/**/*.binlog
            artifacts/TestResults/**/*.trx
